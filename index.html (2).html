<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 4 - Stylish User Form</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Trebuchet MS', sans-serif;
        /* REPLACE YOUR CURRENT BODY AND FORM COLORS WITH THIS DESIGN */

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #000000, #0f2027, #203a43, #2c5364, #00ff88);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
}

/* FORM CONTAINER */
.form-box {
    width: 100%;
    max-width: 600px;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(18px);
    border-radius: 25px;
    padding: 40px;
    box-shadow: 0 15px 45px rgba(0, 255, 136, 0.25);
    border: 2px solid rgba(0, 255, 136, 0.2);
    color: white;
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 38px;
    color: #00ff88;
    text-shadow: 0 0 12px rgba(0,255,136,0.4);
    letter-spacing: 2px;
}

/* LABELS */
label {
    display: block;
    margin-bottom: 8px;
    font-size: 15px;
    font-weight: bold;
    color: #d8ffe8;
}

/* INPUTS */
input[type="text"],
input[type="number"],
textarea,
select {
    width: 100%;
    padding: 14px;
    border: 1px solid rgba(0,255,136,0.25);
    border-radius: 12px;
    background: rgba(20, 20, 20, 0.95);
    font-size: 15px;
    color: #00ff88;
    outline: none;
    transition: 0.3s;
}

/* PLACEHOLDER */
input::placeholder,
textarea::placeholder {
    color: rgba(0,255,136,0.5);
}

/* FOCUS EFFECT */
input:focus,
textarea:focus,
select:focus {
    box-shadow: 0 0 12px rgba(0,255,136,0.5);
    border-color: #00ff88;
    transform: scale(1.02);
}

/* RADIO AND CHECKBOX */
input[type="radio"],
input[type="checkbox"] {
    accent-color: #00ff88;
    transform: scale(1.2);
}

/* BUTTON GROUP */
.button-group {
    display: flex;
    justify-content: space-between;
    margin-top: 25px;
}

/* SUBMIT BUTTON */
input[type="submit"] {
    width: 48%;
    padding: 14px;
    border: none;
    border-radius: 15px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    color: black;
    background: linear-gradient(to right, #00ff88, #00cc66);
    transition: 0.3s;
}

/* RESET BUTTON */
button {
    width: 48%;
    padding: 14px;
    border: none;
    border-radius: 15px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    color: white;
    background: linear-gradient(to right, #111111, #333333);
    border: 1px solid #00ff88;
    transition: 0.3s;
}

/* BUTTON HOVER */
input[type="submit"]:hover,
button:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 8px 20px rgba(0,255,136,0.35);
}

/* RESPONSIVE */
@media (max-width: 650px) {
    .button-group {
        flex-direction: column;
        gap: 12px;
    }

    input[type="submit"],
    button {
        width: 100%;
    }
}   
    </style>
</head>
<body>

    <div class="form-box">
        <h2>User Information Form</h2>

        <form action="/submit" method="post">

            <div class="input-group">
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="firstname" required>
            </div>

            <div class="input-group">
                <label for="lname">Last Name:</label>
                <input type="text" id="lname" name="lastname" required>
            </div>

            <div class="input-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required>
            </div>

            <label>Gender:</label>
            <div class="options">
                <div>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male" style="display:inline;">Male</label>
                </div>

                <div>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female" style="display:inline;">Female</label>
                </div>

                <div>
                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other" style="display:inline;">Other</label>
                </div>
            </div>

            <label>Hobbies:</label>
            <div class="options">
                <div>
                    <input type="checkbox" id="hobby1" name="interest" value="coding">
                    <label for="hobby1" style="display:inline;">Coding</label>
                </div>

                <div>
                    <input type="checkbox" id="hobby2" name="interest" value="music">
                    <label for="hobby2" style="display:inline;">Music</label>
                </div>

                <div>
                    <input type="checkbox" id="hobby3" name="interest" value="sports">
                    <label for="hobby3" style="display:inline;">Sports</label>
                </div>
            </div>

            <div class="input-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" placeholder="Enter your message"></textarea>
            </div>

            <div class="input-group">
                <label for="year-level">Year Level:</label>
                <select id="year-level" name="year-level">
                    <option value="1st-year">1st Year</option>
                    <option value="2nd-year">2nd Year</option>
                    <option value="3rd-year">3rd Year</option>
                    <option value="4th-year">4th Year</option>
                </select>
            </div>

            <div class="button-group">
                <input type="submit" value="Send Data">
                <button type="reset">Reset</button>
            </div>

        </form>
    </div>

</body>
</html>
